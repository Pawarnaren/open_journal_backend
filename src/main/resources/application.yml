server:
  port: ${PORT:8080}

spring:
  application:
    name: openjournal-backend
  data:
    mongodb:
      uri: ${MONGODB_URI}

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000

cors:
  allowed-origins: http://localhost:5173,http://localhost:5174,http://localhost:5175,http://localhost:5176,https://open-journal-naren.netlify.app

logging:
  level:
    com.openjournal.backend: DEBUG
    org.springframework.security: DEBUG
    org.springframework.data.mongodb.core.MongoTemplate: DEBUG
